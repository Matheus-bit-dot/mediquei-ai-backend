<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediquei IA - Assistente Virtual</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; display: flex; justify-content: center; height: 100vh; }
        #chat-container { width: 100%; max-width: 480px; background: white; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative; }
        #header { background: #075e54; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.1em; border-bottom: 3px solid #128c7e; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: #e5ddd5; }
        .message { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 0.95em; line-height: 1.4; position: relative; }
        .user { align-self: flex-end; background-color: #dcf8c6; color: #303030; border-top-right-radius: 0; }
        .bot { align-self: flex-start; background-color: #ffffff; color: #303030; border-top-left-radius: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        #input-area { padding: 15px; background: #f0f0f0; display: flex; align-items: center; }
        input { flex: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 1em; }
        button { background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; margin-left: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        button:hover { background: #128c7e; transform: scale(1.05); }

        /* BOTÃO WHATSAPP FLUTUANTE */
        .wpp-btn {
            position: absolute; bottom: 85px; right: 20px;
            background: #25d366; width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.3s; z-index: 999;
        }
        .wpp-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Mediquei IA ⚕️</div>
    
    <div id="chat-box">
        <div class="message bot">Olá! Sou o assistente da Mediquei. Como posso ajudar você hoje?</div>
    </div>

    <a href="https://wa.me/5516999930849" class="wpp-btn" target="_blank" title="Falar com Especialista">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="30" alt="WhatsApp">
    </a>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Digite sua dúvida..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const text = input.value.trim();
        if (!text) return;

        appendMessage("user", text);
        input.value = "";

        const loading = document.createElement("div");
        loading.className = "message bot";
        loading.innerText = "Digitando...";
        chatBox.appendChild(loading);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch("https://mediquei-ia.onrender.com/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ texto: text })
            });
            const data = await response.json();
            chatBox.removeChild(loading);
            
            const botReply = data.resposta || "Desculpe, não consegui entender.";
            appendMessage("bot", botReply);
            
        } catch (err) {
            chatBox.removeChild(loading);
            appendMessage("bot", "O servidor está ligando. Aguarde alguns segundos e tente novamente!");
        }
    }

    function appendMessage(sender, text) {
        const chatBox = document.getElementById("chat-box");
        const div = document.createElement("div");
        div.className = "message " + sender;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>

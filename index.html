<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediquei IA - Assistente</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e5ddd5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 100%; max-width: 450px; height: 80vh; background: #fff; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .message { padding: 12px 16px; border-radius: 10px; max-width: 75%; font-size: 0.95em; line-height: 1.4; position: relative; }
        .user { align-self: flex-end; background-color: #dcf8c6; color: #000; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background-color: #fff; color: #000; border-bottom-left-radius: 2px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        #input-area { display: flex; padding: 15px; background: #f0f0f0; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; padding-left: 20px; }
        button { background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; margin-left: 10px; cursor: pointer; font-weight: bold; font-size: 1.2em; display: flex; align-items: center; justify-content: center; }
        button:hover { background: #128c7e; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Mediquei IA ⚕️</div>
    <div id="chat-box">
        <div class="message bot">Olá! Sou o assistente da Mediquei. Como posso ajudar com sua saúde hoje?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Digite sua mensagem..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">></button>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const message = input.value.trim();

        if (!message) return;

        // Adiciona mensagem do usuário
        appendMessage("user", message);
        input.value = "";

        // Balão de carregamento
        const typingDiv = document.createElement("div");
        typingDiv.className = "message bot";
        typingDiv.innerText = "Digitando...";
        chatBox.appendChild(typingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // CONEXÃO COM O LINK CORRETO: mediquei-ia
            const response = await fetch("https://mediquei-ia.onrender.com/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();
            chatBox.removeChild(typingDiv);

            if (data.response) {
                appendMessage("bot", data.response);
            } else {
                appendMessage("bot", "Recebi sua mensagem, mas houve um erro na resposta.");
            }

        } catch (error) {
            chatBox.removeChild(typingDiv);
            console.error("Erro de conexão:", error);
            appendMessage("bot", "O servidor está a 'acordar'. Por favor, aguarde 30 segundos e tente enviar novamente.");
        }
    }

    function appendMessage(sender, text) {
        const chatBox = document.getElementById("chat-box");
        const div = document.createElement("div");
        div.className = "message " + sender;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediquei IA</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; }
        #chat-container { width: 100%; max-width: 500px; height: 100vh; background: white; display: flex; flex-direction: column; position: relative; }
        #header { background: #075e54; color: white; padding: 20px; text-align: center; font-weight: bold; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-color: #e5ddd5; }
        .message { padding: 12px; border-radius: 10px; max-width: 85%; line-height: 1.4; font-size: 15px; word-wrap: break-word; }
        .user { align-self: flex-end; background: #dcf8c6; }
        .bot { align-self: flex-start; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bot a { color: #075e54; font-weight: bold; text-decoration: underline; }
        #input-area { padding: 15px; display: flex; background: #f0f0f0; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        button { background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>
<div id="chat-container">
    <div id="header">Mediquei IA ⚕️</div>
    <div id="chat-box">
        <div class="message bot">Olá! Sou o assistente da Mediquei. Como posso te ajudar a encontrar o melhor plano de saúde com o suporte do Matheus Russi?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Digite sua dúvida..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // Função para transformar o formato [Texto](Link) da IA em link real HTML
    function parseMarkdown(text) {
        const urlRegex = /\[([^\]]+)\]\(([^)]+)\)/g;
        return text.replace(urlRegex, '<a href="$2" target="_blank">$1</a>');
    }

    async function sendMessage() {
        const input = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const text = input.value.trim();
        if (!text) return;

        appendMessage("user", text);
        input.value = "";

        try {
            const response = await fetch("https://mediquei-ia.onrender.com/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ texto: text })
            });
            const data = await response.json();
            appendMessage("bot", data.resposta);
        } catch (e) {
            appendMessage("bot", "Estou reconectando... tente em instantes.");
        }
    }

    function appendMessage(sender, text) {
        const chatBox = document.getElementById("chat-box");
        const div = document.createElement("div");
        div.className = "message " + sender;
        // Se for o bot, processa os links
        if (sender === "bot") {
            div.innerHTML = parseMarkdown(text);
        } else {
            div.innerText = text;
        }
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>

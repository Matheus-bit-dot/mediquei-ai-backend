<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediquei IA - Assistente Virtual</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; height: 500px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
        .user { align-self: flex-end; background-color: #007bff; color: white; }
        .bot { align-self: flex-start; background-color: #e9e9eb; color: #333; }
        #input-area { display: flex; padding: 10px; background: #fff; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 5px; margin-left: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-box">
        <div class="message bot">Olá! Eu sou o Mediquei IA. Como posso te ajudar hoje?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Digite sua dúvida médica..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const message = input.value.trim();

        if (!message) return;

        // 1. Mostrar mensagem do usuário na tela
        appendMessage("user", message);
        input.value = "";

        // 2. Criar um balão de "Pensando..."
        const typingDiv = document.createElement("div");
        typingDiv.className = "message bot";
        typingDiv.innerText = "Analisando...";
        chatBox.appendChild(typingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // 3. CONEXÃO COM O SEU BACKEND NO RENDER
            const response = await fetch("https://mediquei-ia.onrender.com/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();
            
            // Remover o "Analisando..." e colocar a resposta real
            chatBox.removeChild(typingDiv);

            if (data.response) {
                appendMessage("bot", data.response);
            } else {
                appendMessage("bot", "Desculpe, tive um problema ao processar sua resposta.");
            }

        } catch (error) {
            chatBox.removeChild(typingDiv);
            console.error("Erro:", error);
            appendMessage("bot", "O servidor está acordando... Por favor, tente enviar novamente em 30 segundos.");
        }
    }

    function appendMessage(sender, text) {
        const chatBox = document.getElementById("chat-box");
        const div = document.createElement("div");
        div.className = "message " + sender;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>

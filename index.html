<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediquei IA - Assistente</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e5ddd5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 100%; max-width: 450px; height: 85vh; background: #fff; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background-color: #f7f7f7; }
        .message { padding: 12px 16px; border-radius: 10px; max-width: 80%; font-size: 0.95em; line-height: 1.4; }
        .user { align-self: flex-end; background-color: #dcf8c6; color: #000; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background-color: #fff; color: #000; border-bottom-left-radius: 2px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        #input-area { display: flex; padding: 15px; background: #f0f0f0; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; padding-left: 20px; }
        button { background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; margin-left: 10px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        button:hover { background: #128c7e; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Mediquei IA ⚕️</div>
    <div id="chat-box">
        <div class="message bot">Olá! Sou o assistente da Mediquei. Como posso ajudar com sua dúvida de saúde hoje?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Digite sua mensagem..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const userText = input.value.trim();

        if (!userText) return;

        // Adiciona mensagem do usuário na tela
        appendMessage("user", userText);
        input.value = "";

        // Balão de "Digitando..."
        const typingDiv = document.createElement("div");
        typingDiv.className = "message bot";
        typingDiv.innerText = "Analisando...";
        chatBox.appendChild(typingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // CONEXÃO COM O BACKEND (Link atualizado para mediquei-ia)
            const response = await fetch("https://mediquei-ia.onrender.com/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                // IMPORTANTE: Enviando como 'texto' para bater com o seu main.py
                body: JSON.stringify({ texto: userText }) 
            });

            const data = await response.json();
            
            // Remove o balão de carregamento
            if (typingDiv.parentNode) chatBox.removeChild(typingDiv);

            // Tenta ler 'resposta' ou 'response' (depende do seu main.py)
            const botReply = data.resposta || data.response || "Recebi os dados, mas não entendi o formato da resposta.";
            appendMessage("bot", botReply);

        } catch (error) {
            if (typingDiv.parentNode) chatBox.removeChild(typingDiv);
            console.error("Erro de conexão:", error);
            appendMessage("bot", "O servidor está ligando (isso leva uns 40 segundos na primeira vez). Tente enviar novamente agora!");
        }
    }

    function appendMessage(sender, text) {
        const chatBox = document.getElementById("chat-box");
        const div = document.createElement("div");
        div.className = "message " + sender;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
